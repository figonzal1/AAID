name: CI - Testing

on:
  push:
    branches:
      - 10-feat-ci-testing
  pull_request:
    branches:
      - 10-feat-ci-testing

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ─── Job 1: Unit Tests ────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: test

    steps:
      - uses: actions/checkout@v4

      - name: Install mise and Java
        uses: jdx/mise-action@v3
        with:
          cache: true

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 36
          build-tools: 36.1.0

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', 'gradle/libs.versions.toml', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Cache Ruby gems
        uses: actions/cache@v4
        with:
          path: vendor/bundle
          key: gems-${{ hashFiles('Gemfile.lock') }}
          restore-keys: gems-

      - name: Install Ruby gems
        run: bundle install --path vendor/bundle

      - name: Create keystore from secrets
        run: |
          mkdir -p keys
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > keys/release.jks

      - name: Create keystore.properties
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          printf 'storeFile=keys/release.jks\nstorePassword=%s\nkeyAlias=%s\nkeyPassword=%s\n' \
            "$KEYSTORE_PASSWORD" "$KEY_ALIAS" "$KEY_PASSWORD" > keys/keystore.properties

      - name: Create secrets.properties
        run: |
          printf 'ADMOB_APP_ID=%s\nADMOB_MASTER_KEY=%s\n' \
            "${{ secrets.ADMOB_APP_ID }}" "${{ secrets.ADMOB_MASTER_KEY }}" > secrets.properties

      - name: Create google-services.json
        run: |
          echo "${{ secrets.GOOGLE_SERVICES_BASE64 }}" | base64 --decode > app/google-services.json

      - name: Fix gradlew line endings and permissions
        run: sed -i 's/\r$//' gradlew && chmod +x gradlew

      - name: Run unit tests
        run: bundle exec fastlane unit_test

      - name: Upload unit test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: app/build/reports/tests/testDebugUnitTest/
